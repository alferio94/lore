name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Validate staging artifacts script
        run: ./scripts/validate-staging.sh

      - name: Prepare staging env for compose validation
        run: cp .env.example .env.staging

      - name: Validate staging compose syntax
        run: docker compose -f docker-compose.staging.yml config --quiet

      - name: Run unit tests
        run: go test ./...

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Run e2e tests
        run: go test -tags e2e ./internal/server/...
