services:
  postgres:
    image: postgres:16-alpine
    container_name: lore-postgres-local
    environment:
      POSTGRES_USER: lore
      POSTGRES_PASSWORD: lore
      POSTGRES_DB: lore
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lore -d lore"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - lore-postgres-data:/var/lib/postgresql/data

volumes:
  lore-postgres-data:
